<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #064e3b 0%, #047857 30%, #f59e0b 70%, #d97706 100%);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.2), transparent 70%);
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite;
        }
        .login-page::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15), transparent 70%);
            border-radius: 50%;
            animation: pulse 6s ease-in-out infinite reverse;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(10deg); }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-card .logo .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f59e0b, #10b981);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 12px;
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.3);
        }
        .login-card .logo h3 {
            font-weight: 700;
            color: #0f172a;
        }
        .login-card .logo h3 span {
            background: linear-gradient(135deg, #f59e0b, #10b981);

            -webkit-text-fill-color: transparent;
        }
        .login-card .logo p {
            color: #64748b;
            font-size: 14px;
        }
        .login-card .form-group {
            margin-bottom: 20px;
        }
        .login-card .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .login-card .form-group .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #d1fae5;
            transition: all 0.3s ease;
            background: white;
        }
        .login-card .form-group .input-group:focus-within {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .login-card .form-group .input-group-text {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 12px 16px;
        }
        .login-card .form-group .form-control {
            border: none;
            padding: 12px 16px 12px 0;
            background: transparent;
            font-size: 15px;
        }
        .login-card .form-group .form-control:focus {
            box-shadow: none;
        }
        .login-card .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #10b981);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
        }
        .login-card .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .login-card .demo-info {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 12px;
            font-size: 13px;
            color: #64748b;
            border: 1px solid #d1fae5;
        }
        .login-card .demo-info strong {
            color: #059669;
        }
        .login-card .alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            display: none;
        }
        .login-card .alert.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }
        .floating-shape.shape-1 {
            width: 100px;
            height: 100px;
            background: #f59e0b;
            top: 10%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
        }
        .floating-shape.shape-2 {
            width: 150px;
            height: 150px;
            background: #10b981;
            bottom: 15%;
            right: 10%;
            animation: float 8s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        @media (max-width: 576px) {
            .login-card { padding: 32px 24px; margin: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>

        <div class="login-card">
            <div class="logo">
                <div class="brand-icon animate-pulse">
                    <i class="bi bi-box-seam"></i>
                </div>
                <h3>Inventory <span>System</span></h3>
                <p>Manajemen inventori modern &amp; profesional</p>
            </div>

            <div id="alertMessage" class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i>
                <span id="alertText">Login gagal</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="admin@example.com" value="admin@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Masukkan password" value="admin123" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword" style="border: none; background: transparent; padding: 0 16px;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span>Login</span>
                </button>
            </form>

            <div class="demo-info">
                <i class="bi bi-info-circle text-success"></i>
                Demo: <strong>admin@example.com</strong> / <strong>admin123</strong>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config/supabase.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('alertMessage');
            const alertText = document.getElementById('alertText');
            const loginBtn = document.getElementById('loginBtn');
            
            alertDiv.classList.remove('show');
            
            if (!email || !password) {
                alertText.textContent = 'Harap isi email dan password';
                alertDiv.classList.add('show');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('session', JSON.stringify(data.session));
                    
                    showToast('Login berhasil! Selamat datang kembali.', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                }
            } catch (error) {
                alertText.textContent = error.message || 'Login gagal. Silakan coba lagi.';
                alertDiv.classList.add('show');
                showToast('Login gagal: ' + (error.message || 'Coba lagi'), 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<i class="bi bi-box-arrow-in-right"></i><span>Login</span>`;
            }
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer') || createToastContainer();
            const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill' };
            const toast = document.createElement('div');
            toast.className = `toast-item ${type}`;
            toast.style.cssText = `padding: 16px 20px; border-radius: 12px; color: white; font-weight: 500; box-shadow: 0 8px 30px rgba(0,0,0,0.15); animation: slideInLeft 0.4s ease; display: flex; align-items: center; gap: 12px; min-width: 300px; max-width: 450px; background: ${type === 'success' ? 'linear-gradient(135deg, #10b981, #059669)' : type === 'error' ? 'linear-gradient(135deg, #ef4444, #dc2626)' : type === 'warning' ? 'linear-gradient(135deg, #f59e0b, #d97706)' : 'linear-gradient(135deg, #3b82f6, #2563eb)'};`;
            toast.innerHTML = `<i class="bi ${icons[type] || icons.info}"></i><span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()" style="margin-left: auto; background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: 0.7;">&times;</button>`;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentElement) { toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 300); } }, 5000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.style.cssText = 'position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px;';
            document.body.appendChild(container);
            return container;
        }

        (async function checkAuth() {
            try {
                const user = localStorage.getItem('user');
                if (user) {
                    const { data: { user: currentUser }, error } = await supabaseClient.auth.getUser();
                    if (!error && currentUser) {
                        window.location.href = 'dashboard.html';
                    } else {
                        localStorage.removeItem('user');
                        localStorage.removeItem('session');
                    }
                }
            } catch (error) {}
        })();
    </script>
</body>
</html>
